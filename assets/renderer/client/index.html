<!doctype html>
<!--
  Module: Live renderer shell

  Runtime flow:
  - Vite loads `/src/main.ts` into the browser stage.
  - The page connects to `/events` for runtime commands and can autoplay a local
    danmaku fixture with `?autoplay=1`.
  - This first live slice renders text, queue state, and sample events only. It
    intentionally does not mount Live2D yet.
-->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stelle Live Stage</title>
  </head>
  <body>
    <main id="app">
      <section class="stage" aria-label="Stelle browser stage">
        <div class="orb" aria-hidden="true"></div>
        <div class="stage-copy">
          <p class="eyebrow">Stelle Live Stage</p>
          <h1 id="caption">Renderer ready.</h1>
          <p id="speaker" class="speaker">waiting for stream</p>
        </div>
        <aside class="event-panel" aria-label="Danmaku sample events">
          <p class="panel-title">incoming</p>
          <ol id="event-log"></ol>
        </aside>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
